# cbindgen config for `sdr-ffi`.
#
# This config is used by `make ffi-header-check` (the drift linter
# in the workspace Makefile) and `make ffi-header-regen` (manual
# starting point when adding a new batch of FFI functions).
#
# cbindgen is NOT run as a cargo build step. The hand-written
# `include/sdr_core.h` is the source of truth; this config exists
# only to generate a comparison artifact that the drift linter can
# diff against.

language = "C"
pragma_once = false
include_guard = "SDR_CORE_GENERATED_H"
header = """
/*
 * This file is GENERATED by cbindgen from `crates/sdr-ffi/`.
 * Do NOT commit it. Do NOT edit it by hand.
 *
 * It is produced by `make ffi-header-regen` as a starting point
 * when adding new FFI functions. The real, hand-written header
 * is `include/sdr_core.h` — that's the source of truth for the
 * C ABI contract.
 *
 * `make ffi-header-check` compares the signatures declared in
 * this generated file against the signatures in the hand-written
 * header and fails CI if they diverge. Drift between the two
 * means someone edited one without editing the other.
 */
"""
# `style = "both"` emits both the tag and typedef for each
# struct/enum, matching the hand-written header's idiom:
#   `typedef struct Foo { ... } Foo;`
# cbindgen's default `"tag"` emitted `struct Foo*` everywhere and
# `"type"` emits anonymous `typedef struct {...} Foo;` — neither
# matches the hand-written style.
style = "both"
cpp_compat = true
sys_includes = ["stdbool.h", "stddef.h", "stdint.h"]
no_includes = true
# Don't wrap function signatures across multiple lines — the
# hand-written header keeps each prototype on one line, and the
# drift check diffs line-by-line.
line_length = 200
# Map Rust `usize` / `isize` to C `size_t` / `ptrdiff_t` instead of
# cbindgen's defaults (`uintptr_t` / `intptr_t`). The hand-written
# header uses `size_t` in public API like `sdr_core_device_name`'s
# `buf_len`, and `size_t` is the conventional choice for buffer
# lengths in C APIs. `uintptr_t` and `size_t` happen to be the same
# type on every platform we target, but spelling them consistently
# keeps the drift check meaningful.
usize_is_size_t = true

[parse]
parse_deps = false

[fn]
prefix = ""
postfix = ""
args = "auto"
rename_args = "None"
